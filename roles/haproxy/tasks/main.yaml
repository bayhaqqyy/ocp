- name: Install HAProxy
  package:
    name: haproxy
    state: present

- name: Deploy HAProxy config
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
  notify: restart haproxy

- name: Enable HAProxy
  service:
    name: haproxy
    state: started
    enabled: yes
