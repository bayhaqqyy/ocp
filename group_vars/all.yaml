# ========================
# DNS (dnsmasq)
# ========================
dns_interface: ens192

upstream_dns:
  - 10.253.4.20
  - 10.253.4.21

# ========================
# HTTP (ignition)
# ========================
http_port: 8080
http_root: /var/www/html

# ========================
# DIRECTORY
# ========================
ocp_dir: /root/ocp
yaml_dir: /root/yaml_collection

# ========================
# OPENSHIFT VERSION
# ========================
ocp_version: 4.16.46
openshift_install_url: "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/{{ ocp_version }}/openshift-install-linux.tar.gz"
oc_client_url: "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/{{ ocp_version }}/openshift-client-linux.tar.gz"

# ========================
# VMWARE / VCENTER
# ========================
vmware_provision_enabled: false
vcenter_ip: 10.0.0.100
vcenter_username: administrator@vsphere.local
vcenter_password: changeme
vcenter_validate_certs: false
vcenter_datacenter: DC1
vcenter_cluster: Cluster01
vcenter_datastore: datastore1
vcenter_folder: /DC1/vm/ocp-dgt-jkt
vcenter_resource_pool: Resources
vcenter_network_name: VM Network
vmware_template_name: rhcos-template
vmware_guest_id: otherGuest64
vmware_vm_state: poweredon

vmware_network:
  gateway: 10.0.0.1
  netmask: 255.255.255.0
  device_name: ens192
  dns_servers:
    - 10.253.4.20
    - 10.253.4.21

vmware_defaults:
  num_cpus: 4
  num_cpu_cores_per_socket: 2
  memory_mb: 16384
  disk_gb: 120
  disk_type: thin

# ========================
# AUTH
# ========================
pull_secret: '{"auths": {...}}'
ssh_key: 'ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQ...'
